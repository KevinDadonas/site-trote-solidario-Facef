<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Exercícios</title>
        <script src="script.js" defer></script>
    </head>
    <body>
        <section>
            <h3>Calculadora da churrasqueira</h3>
            <div>
                <label>Qtde de pessoas</label>
                <input type="number" id="qtdePessoas" value="0" min="0">
            </div>
            <button onclick="churras()">
                Calcula Kgs de carne
            </button>
            <div id="resultadoChurras">

            </div>
        </section>

        <section>
            <h3>Verificador do Estado Febril</h3>
            <div>
                <label>Temperatura</label>
                <input type="number" id="temperatura" value="0" min="0">
            </div>
            <button onclick="febre()">Verifica estado febril</button>
            <div id="resultadoFebril">

            </div>
        </section>

        <section>
            <h3>Autorizador de crédito bancário</h3>
            <div>
                <label>Renda</label>
                <input type="number" id="renda" value="0" min="0">
            </div>
            <div>
                <label>Idade</label>
                <input type="number" id="idade" value="0" min="0">
            </div>
            <button onclick="credito()">Verificar crédito</button>
            <div id="resultadoCredito">
                
            </div>
        </section>

        <section>
            <h3>Torneio de Lutas</h3>
            <div>
                <label>Idade</label>
                <input type="number" id="idadeLuta" value="0" min="0">
            </div>
            <div>
                <label>Peso</label>
                <input type="number" id="peso" value="0" min="0">
            </div>
            <button onclick="luta()">Verificar meliante</button>
            <div id="resultadoLuta">
                
            </div>
        </section>
    </body>
</html>
